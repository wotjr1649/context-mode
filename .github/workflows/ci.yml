name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.5"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - uses: erlef/setup-beam@v1
        if: runner.os != 'Windows'
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Elixir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install elixir --yes --no-progress

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

      - name: Bundle
        run: npm run bundle

      - name: Assert bundle invariants (G3 — Issue #511 guardrail)
        run: npm run assert-bundle

      - name: Run all tests
        shell: bash
        run: |
          # Run tests, capture output + exit code.
          # Vitest fork workers can crash during cleanup on CI (native addon teardown race)
          # even when all tests pass. We check the actual test results instead of relying
          # solely on the exit code.
          set +e
          npx vitest run 2>&1 | tee /tmp/vitest-output.txt
          # PIPESTATUS[0], not $?. `shell: bash` gets us `-eo pipefail`, so $? does
          # read vitest today — but the check below is worthless if this ever reads
          # tee's status instead, and that would happen silently the moment someone
          # drops the `shell: bash` line. Don't rest a guard on an invisible default.
          VITEST_EXIT=${PIPESTATUS[0]}
          set -e

          # The only excuse for a non-zero exit is the known worker-teardown race
          # (Windows, kill EPERM / errno -4048). Anything else is a real failure.
          teardown_race() {
            [ "$RUNNER_OS" = "Windows" ] && grep -q "Error: kill EPERM" /tmp/vitest-output.txt
          }

          # Extract results from vitest output
          if grep -q "Tests.*failed" /tmp/vitest-output.txt; then
            echo "❌ Test failures detected"
            exit 1
          elif grep -q "Test Files.*failed" /tmp/vitest-output.txt; then
            echo "❌ Test file failures detected"
            exit 1
          elif grep -q "Tests.*passed" /tmp/vitest-output.txt; then
            # A clean summary does not clear a non-zero exit on its own: vitest also
            # reports unhandled errors after the summary and exits non-zero with every
            # test passing. Only the teardown race gets excused.
            if [ "$VITEST_EXIT" -ne 0 ] && ! teardown_race; then
              echo "❌ All tests passed but vitest exited $VITEST_EXIT — not the known teardown race"
              exit "$VITEST_EXIT"
            fi
            echo "✅ All tests passed (exit $VITEST_EXIT)"
            exit 0
          elif teardown_race; then
            # Crashed during worker teardown BEFORE printing the summary line. Look for
            # per-suite failure markers instead — if none, treat as pass.
            if grep -qE "FAIL +tests/|⨯ +tests/" /tmp/vitest-output.txt; then
              echo "❌ Per-suite failures detected before teardown crash"
              exit 1
            fi
            echo "⚠️ Vitest worker teardown race (Windows kill EPERM) — no failures detected; treating as pass."
            exit 0
          else
            echo "❌ Could not parse test results"
            exit $VITEST_EXIT
          fi

      - name: Doctor (verify server starts)
        run: npx tsx src/cli.ts doctor
        continue-on-error: true
